# Quarkus
app.modo=WEB
quarkus.http.port=8080
quarkus.http.host=127.0.0.1

quarkus.arc.ignored-split-packages=org.traducao.projeto

quarkus.log.file.path=logs/tradutor.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

%dev.quarkus.config.locations=application-local.yml
# Evita que o navegador cacheie agressivamente (Cache-Control: immutable,
# max-age=86400) os arquivos estáticos em src/main/resources/static durante o
# desenvolvimento, o que mascarava edições recentes atrás de conteúdo antigo.
%dev.quarkus.http.static-resources.caching-enabled=false

# Testes
%test.app.modo=WEB
%test.app.browser.auto-open=false
%test.quarkus.http.test-port=0
