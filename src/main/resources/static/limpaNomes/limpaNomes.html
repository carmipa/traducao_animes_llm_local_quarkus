                    <div class="glass-card">
                        <h2>Sanitizador Industrial de Nomes (Bulk Renamer)</h2>
                        <p class="card-desc">Limpe nomes confusos de release groups de tracker em nomes de arquivo limpos usando expressões regulares e metadados, mantendo suporte ao rollback (Reversão).</p>

                        <div class="anime-meta-banner hidden" id="meta-banner-limpanome"></div>

                        <form id="form-limpa-nome" class="standard-form">
                            <div class="form-group">
                                <label for="limpanome-contexto">Obra / Contexto: <span class="help-icon" data-tooltip="Selecione a obra para preencher automaticamente o padrão e nome base.">?</span></label>
                                <select id="limpanome-contexto" required>
                                    <option value="" disabled selected>Carregando contextos...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="limpanome-entrada">Pasta dos Arquivos a Renomear: <span class="help-icon" data-tooltip="Caminho onde estão os arquivos de vídeo ou legendas.">?</span></label>
                                <div class="input-with-button">
                                    <input type="text" id="limpanome-entrada" placeholder="Ex: C:\animes\[SubsPlease] Nome Anime" required>
                                    <button type="button" class="btn-procurar" data-target="limpanome-entrada" data-type="pasta"><span class="material-symbols-outlined btn-inline-icon">folder_open</span>Procurar...</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="limpanome-padrao">Nome Novo Padrão (Sem Extensão): <span class="help-icon" data-tooltip="O padrão de nomenclatura para o arquivo base. Exemplo: 'Nome do Anime'. O sistema adicionará ' - S01E[Num]' automaticamente, onde [Num] é extraído por Regex do nome antigo.">?</span></label>
                                <input type="text" id="limpanome-padrao" placeholder="Ex: DanMachi Season 4" required>
                            </div>
                            
                            <div class="correcao-actions">
                                <button type="button" class="btn btn-secondary btn-yellow" id="btn-limpanome-simular" data-tooltip="Apenas lista as alterações para conferência sem renomear nenhum arquivo (Dry-Run).">
                                    <span class="material-symbols-outlined btn-icon">science</span>
                                    <span>Simular (Dry-Run)</span>
                                </button>
                                <button type="submit" class="btn btn-primary btn-green" id="btn-limpanome-aplicar" data-tooltip="Aplica a renomeação em disco. Um backup .json para reversão será criado na pasta.">
                                    <span class="material-symbols-outlined btn-icon">cleaning_services</span>
                                    <span>Aplicar Renomeação</span>
                                </button>
                                <button type="button" class="btn btn-secondary btn-red" id="btn-limpanome-reverter" data-tooltip="Reverte arquivos renomeados anteriormente baseado no .kronos_undo_renomeacao.json dentro da pasta alvo.">
                                    <span class="material-symbols-outlined btn-icon">undo</span>
                                    <span>Reverter (Undo)</span>
                                </button>
                                <button type="button" class="btn btn-secondary btn-clear-form" data-form="form-limpa-nome" data-tooltip="Limpa todos os campos e oculta o cartão do anime">
                                    <span class="material-symbols-outlined btn-icon">delete_sweep</span>
                                    <span>Limpar Campos</span>
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="glass-card console-card">
                        <div class="console-header">
                            <h3>Relatório de Renomeação</h3>
                            <div class="console-actions">
                                <button class="btn-toggle-console" data-target="console-limpa-nome" data-tooltip="Alternar altura expandida do console"><span class="material-symbols-outlined console-action-icon">unfold_more</span>Expandir</button>
                                <button class="btn-copy-console" data-target="console-limpa-nome" data-tooltip="Copiar conteúdo do console"><span class="material-symbols-outlined console-action-icon">content_copy</span>Copiar</button>
                                <button class="btn-clear-console" data-target="console-limpa-nome"><span class="material-symbols-outlined console-action-icon">mop</span>Limpar</button>
                            </div>
                        </div>
                        <div class="console-body" id="console-limpa-nome">
                            <div class="system-message">Aguardando execução...</div>
                        </div>
                    </div>
